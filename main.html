<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <table border="1px" style="width: 100%; height: 100%">
      <!-- Your code here -->
	<tr>
		 <!-- Nested Table 2 -->
		<td border="1px">
			<table border="1px">
				<tr>
					<th border="1px" colspan="2">Nested Table 2</th>
				</tr>
				<tr>
					<th border="1px">Column 1</th>
                    <th border="1px">Column 2</th>
				</tr>
				<tr>
					<td border="1px">abc</td>
					<td border="1px">def</td>
				</tr>
			</table>	
		</td>
		
		<!-- Nested Table 1 -->
		<td border="1px">
			<table border="1px" >
				<tr>
					<th border="1px"> Nested Table 1</th>
				</tr>
				<tr>
					<td border="1px">
						<ul>
							<li>List Item</li>
							<li>List Item</li>
							<li>List Item</li>
						</ul>
					</td>
				</tr>
			</table>
		</td>
		
	</tr>
		
	<tr>
		 <!-- Nested Table 3 -->
		<td border="1px">
			<table border="1px">
				<tr>
					<th border="1px" colspan="2">Nested Table 3</th>
				</tr>
				<tr>
					<td border="1px">
						<a href="#">Nested Table</a>
					</td>
					<td>Demo Continued</td>
				</tr>
			</table>
		</td>
		
		   <!-- Nested Table 4 -->
		<td border="1px">
			<table border="1px">
				<tr>
					<th border="1px">Nested Table 4</th>
				</tr>
				<tr>
					<td border="1px" style="background-color:black; color:white" >HTML</td>
				</tr>
			</table>
		</td>
	</tr>
    </table>
  </body>
</html>
